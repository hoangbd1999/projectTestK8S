name: CI/CD - Build, Push & Update ArgoCD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  IMAGE_NAME: admin-console-backend
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Job 1: Build JAR, Docker Image & Push to GHCR
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: admin-console-backend/pom.xml

      # 2.5 Install local Maven dependencies (parent pom and authz-sdk)
      - name: Install Local Maven Dependencies
        run: |
          mvn install:install-file -Dfile=admin-console-backend/local-repo/admin-console-backend-service-0.0.1.pom -DgroupId=com.elcom -DartifactId=admin-console-backend-service -Dversion=0.0.1 -Dpackaging=pom
          mvn install:install-file -Dfile=admin-console-backend/local-repo/authz-sdk-0.0.1.jar -DpomFile=admin-console-backend/local-repo/authz-sdk-0.0.1.pom

      # 3. Build with Maven
      - name: Build with Maven
        working-directory: admin-console-backend
        run: chmod +x mvnw && ./mvnw package -DskipTests -B

      # 4. Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract Docker metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # 6. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-console-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 7. Update image tag in values.yaml (cùng repo)
      - name: Update Helm Image Tag
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          echo "🔄 Updating image tag to: ${IMAGE_TAG}"
          
          # Cập nhật tag trong values.yaml
          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|g" admin-console-k8s-config/charts/admin-console-backend/values.yaml
          
          echo "📄 Updated values.yaml header:"
          head -n 15 admin-console-k8s-config/charts/admin-console-backend/values.yaml

      # 8. Commit & Push trực tiếp về repo (dùng GITHUB_TOKEN mặc định)
      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add admin-console-k8s-config/charts/admin-console-backend/values.yaml
          git diff --staged --quiet || git commit -m "🚀 Update image tag to ${{ steps.meta.outputs.version }} [skip ci]"
          git push
