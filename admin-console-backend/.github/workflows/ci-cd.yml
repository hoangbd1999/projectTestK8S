name: CI/CD - Build, Push & Update GitOps

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  IMAGE_NAME: admin-console-backend
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Job 1: Build JAR, Docker Image & Push to GHCR
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3. Build with Maven
      - name: Build with Maven
        run: ./mvnw package -DskipTests -B

      # 4. Login to GitHub Container Registry
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract Docker metadata (tags, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            # On push to main: tag as "latest" and short SHA
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            # On tag push: use the tag name (e.g., v1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # 6. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 7. Print image info
      - name: Print image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

  # ============================================
  # Job 2: Update GitOps Repo (Helm values.yaml)
  # ============================================
  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      # 1. Checkout the GitOps repository
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/admin-console-k8s-config
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # 2. Update image tag in values.yaml
      - name: Update image tag
        run: |
          cd gitops-repo
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          echo "🔄 Updating image tag to: ${IMAGE_TAG}"

          # Use sed to update the tag value in values.yaml
          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|g" charts/admin-console-backend/values.yaml

          echo "📄 Updated values.yaml:"
          cat charts/admin-console-backend/values.yaml | head -20

      # 3. Commit and push changes
      - name: Commit and push
        run: |
          cd gitops-repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "🚀 Update admin-console-backend image tag to ${{ needs.build-and-push.outputs.image-tag }}"
          git push
