# ============================================
# Image Configuration
# ============================================
image:
  repository: ghcr.io/hoangbd1999/admin-console-backend
  tag: "latest"
  pullPolicy: IfNotPresent

# Image pull secrets for private GHCR
imagePullSecrets:
  - name: ghcr-secret

# ============================================
# Replica & Scaling
# ============================================
replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# ============================================
# Service Configuration
# ============================================
service:
  type: NodePort
  port: 6001
  targetPort: 6001
  nodePort: 30601

# ============================================
# Ingress (disabled by default for local)
# ============================================
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: admin-console.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ============================================
# Resources
# ============================================
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

# ============================================
# Health Checks (Spring Boot Actuator)
# ============================================
livenessProbe:
  httpGet:
    path: /actuator/health
    port: 6001
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 6001
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

