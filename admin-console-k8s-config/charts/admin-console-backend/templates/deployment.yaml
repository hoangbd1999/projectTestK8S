apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admin-console-backend.fullname" . }}
  labels:
    {{- include "admin-console-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "admin-console-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "admin-console-backend.selectorLabels" . | nindent 8 }}
        application: {{ include "admin-console-backend.fullname" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "admin-console-backend.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          # --- Environment variables from ConfigMap ---
          envFrom:
            - configMapRef:
                name: {{ include "admin-console-backend.fullname" . }}-config
            - secretRef:
                name: {{ include "admin-console-backend.fullname" . }}-secret
          # --- Health checks ---
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          # --- Resources ---
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # --- Volume mounts ---
          volumeMounts:
            - name: logback-config
              mountPath: /app/config/logback.xml
              subPath: logback.xml
      volumes:
        - name: logback-config
          configMap:
            name: {{ include "admin-console-backend.fullname" . }}-logback
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
